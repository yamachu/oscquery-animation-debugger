name: package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - run: dotnet tool install --global vrchat.vpm.cli
      - run: vpm install templates
      - run: vpm resolve project .
      - run: git checkout Packages/vpm-manifest.json
      - run: dotnet tool install --global NuGetForUnity.Cli
      - run: nugetforunity restore .

      - uses: actions/cache@v6
        with:
          path: Library
          key: Library-${{ github.event.inputs.package }}-${{ hashFiles('**/Packages/manifest.json', '**/Packages/vpm-manifest.json') }}
          restore-keys: |
            Library-${{ github.event.inputs.package }}-
            Library-

      - name: Export unitypackage
        uses: game-ci/unity-builder@v5
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          unityVersion: 2022.3.22f1
          targetPlatform: StandaloneLinux64
          buildMethod: Dev.Yamachu.OscQueryAnimationDebugger.CI.ExportUnityPackage.Export

      - name: Fix permissions after unity-builder
        run: |
          if [ -d Artifacts ]; then
            sudo chown -R "$USER":"$USER" Artifacts
            sudo chmod -R u+rwX Artifacts
          fi

      - name: Stage third-party dependencies
        shell: pwsh
        run: ./tools/stage-thirdparty-deps.ps1 -ProjectRoot "${{ github.workspace }}" -Clean

      - name: Build VPM zip
        shell: pwsh
        run: ./tools/package-vpm.ps1 -ProjectRoot "${{ github.workspace }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts
          path: |
            Artifacts/*.unitypackage
            Artifacts/*.zip
            Artifacts/*.sha256.txt
            Artifacts/vpm-index-snippet.json
